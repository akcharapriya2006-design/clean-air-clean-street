<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create account — AeroWatch</title>
<meta name="description" content="Join AeroWatch to report air quality hotspots, access the live map, and help keep your neighbourhood informed.">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/pages.css">
<style>
  body.auth-page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    background-image:
      radial-gradient(ellipse 800px 600px at 80% 10%, rgba(139,126,242,0.14), transparent 60%),
      radial-gradient(ellipse 700px 600px at 10% 90%, rgba(53,199,185,0.10), transparent 55%),
      radial-gradient(rgba(230, 238, 248, 0.02) 1px, transparent 0);
    background-size: 100% 100%, 100% 100%, 24px 24px;
  }

  .auth-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--f-display);
    font-weight: 700;
    font-size: 22px;
    color: var(--text);
    text-decoration: none;
    margin-bottom: 28px;
  }
  .auth-brand svg { width: 32px; height: 32px; }

  .auth-card {
    width: 100%;
    max-width: 480px;
    background: rgba(16, 28, 52, 0.75);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(230, 238, 248, 0.1);
    border-radius: var(--radius-lg);
    padding: 40px;
    box-shadow:
      0 24px 64px rgba(0,0,0,0.45),
      0 0 0 1px rgba(139,126,242,0.06) inset;
    animation: cardIn 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(24px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .auth-card h1 {
    font-size: 26px;
    margin-bottom: 6px;
    background: linear-gradient(135deg, #e9edf5 30%, var(--violet));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .auth-card .auth-sub {
    color: var(--text-faint);
    font-size: 14px;
    margin-bottom: 28px;
  }

  .auth-field { margin-bottom: 18px; }
  .auth-field label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-dim);
    margin-bottom: 7px;
    letter-spacing: 0.03em;
  }
  .auth-input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }
  .field-icon {
    position: absolute;
    left: 14px;
    color: var(--text-faint);
    pointer-events: none;
    transition: color 0.2s;
    z-index: 1;
  }
  .auth-field input {
    width: 100%;
    padding: 13px 14px 13px 42px;
    background: rgba(5, 11, 20, 0.6);
    border: 1px solid rgba(230, 238, 248, 0.1);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: var(--f-body);
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .auth-field input::placeholder { color: var(--text-faint); }
  .auth-field input:focus {
    border-color: var(--violet);
    box-shadow: 0 0 0 3px rgba(139,126,242,0.15);
  }
  .auth-field input:focus ~ .field-icon { color: var(--violet); }

  .pwd-toggle {
    position: absolute;
    right: 12px;
    background: none;
    border: none;
    color: var(--text-faint);
    cursor: pointer;
    padding: 4px;
    display: flex;
    align-items: center;
    transition: color 0.15s;
    z-index: 2;
  }
  .pwd-toggle:hover { color: var(--text); }

  /* ── Password strength ─────────────────────────────────────────────────── */
  .pwd-strength {
    margin-top: 8px;
  }
  .pwd-strength-bar {
    height: 4px;
    background: rgba(230,238,248,0.08);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 5px;
  }
  .pwd-strength-fill {
    height: 100%;
    border-radius: 4px;
    width: 0%;
    transition: width 0.35s ease, background 0.35s ease;
  }
  .pwd-strength-label {
    font-size: 12px;
    color: var(--text-faint);
    font-family: var(--f-mono);
    transition: color 0.3s;
  }

  /* ── Role selector ─────────────────────────────────────────────────────── */
  .role-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .role-option { display: none; }
  .role-label {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 14px 10px;
    border: 1.5px solid rgba(230,238,248,0.1);
    border-radius: var(--radius-md);
    cursor: pointer;
    text-align: center;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    font-size: 12.5px;
    color: var(--text-dim);
    font-weight: 500;
  }
  .role-label svg { width: 28px; height: 28px; color: var(--text-faint); transition: color 0.2s; }
  .role-label:hover { border-color: rgba(139,126,242,0.35); color: var(--text); transform: translateY(-2px); }
  .role-label:hover svg { color: var(--violet); }
  .role-option:checked + .role-label {
    border-color: var(--violet);
    background: rgba(139,126,242,0.1);
    color: var(--text);
    box-shadow: 0 0 0 3px rgba(139,126,242,0.15);
  }
  .role-option:checked + .role-label svg { color: var(--violet); }

  /* ── Terms ─────────────────────────────────────────────────────────────── */
  .terms-label {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 13px;
    color: var(--text-dim);
    cursor: pointer;
    line-height: 1.5;
  }
  .terms-label input { margin-top: 2px; accent-color: var(--violet); cursor: pointer; flex: none; }
  .terms-label a { color: var(--violet); }

  /* ── Submit ────────────────────────────────────────────────────────────── */
  .auth-submit {
    width: 100%;
    padding: 14px;
    font-family: var(--f-body);
    font-size: 15px;
    font-weight: 700;
    border: none;
    border-radius: var(--radius-sm);
    background: linear-gradient(135deg, var(--violet), #6b5fd4);
    color: #f0eeff;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: box-shadow 0.2s, transform 0.15s, opacity 0.2s;
    position: relative;
    overflow: hidden;
    margin-top: 22px;
  }
  .auth-submit:hover { box-shadow: 0 8px 28px rgba(139,126,242,0.4); transform: translateY(-1px); }
  .auth-submit:active { transform: translateY(0); }
  .auth-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .btn-spinner {
    display: none;
    width: 18px; height: 18px;
    border: 2px solid rgba(240,238,255,0.3);
    border-top-color: #f0eeff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin: 0 auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .auth-submit.loading .btn-label { display: none; }
  .auth-submit.loading .btn-spinner { display: block; }

  /* ── Error ─────────────────────────────────────────────────────────────── */
  .auth-error {
    display: none;
    background: rgba(232,92,74,0.12);
    border: 1px solid rgba(232,92,74,0.3);
    border-radius: var(--radius-sm);
    color: #f09080;
    font-size: 13.5px;
    padding: 10px 14px;
    margin-bottom: 18px;
  }
  .auth-error.show { display: flex; align-items: center; gap: 8px; animation: shake 0.4s ease; }
  @keyframes shake {
    0%,100%{ transform: translateX(0); }
    20%{ transform: translateX(-6px); }
    40%{ transform: translateX(6px); }
    60%{ transform: translateX(-4px); }
    80%{ transform: translateX(4px); }
  }

  /* ── Success ───────────────────────────────────────────────────────────── */
  .auth-success {
    display: none;
    background: rgba(53,199,185,0.1);
    border: 1px solid rgba(53,199,185,0.3);
    border-radius: var(--radius-sm);
    color: var(--teal);
    font-size: 13.5px;
    padding: 12px 16px;
    text-align: center;
    animation: cardIn 0.3s ease;
  }
  .auth-success.show { display: block; }

  .auth-footer-link {
    text-align: center;
    margin-top: 22px;
    font-size: 13.5px;
    color: var(--text-faint);
  }
  .auth-footer-link a { color: var(--teal); text-decoration: none; font-weight: 600; }
  .auth-footer-link a:hover { text-decoration: underline; }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 500px) {
    .auth-card { padding: 28px 20px; }
    .two-col { grid-template-columns: 1fr; }
    .role-grid { grid-template-columns: 1fr; }
  }

  .section-label {
    font-family: var(--f-mono);
    font-size: 11.5px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-faint);
    margin-bottom: 10px;
    margin-top: 4px;
  }
</style>
</head>
<body class="auth-page">

  <a href="index.html" class="auth-brand">
    <svg viewBox="0 0 26 26" fill="none">
      <path d="M13 2 L23 8 V18 L13 24 L3 18 V8 Z" stroke="#35c7b9" stroke-width="1.6"/>
      <circle cx="13" cy="13" r="4.2" fill="#35c7b9"/>
    </svg>
    AeroWatch
  </a>

  <div class="auth-card">
    <h1>Create your account</h1>
    <p class="auth-sub">Join the neighbourhood air quality network. Free forever.</p>

    <div class="auth-error" id="reg-error" role="alert">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.6"/>
        <path d="M12 8v4M12 16h.01" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <span id="reg-error-msg">Something went wrong.</span>
    </div>

    <div class="auth-success" id="reg-success">
      <strong>✓ Account created!</strong><br>
      Redirecting you to sign in…
    </div>

    <form id="reg-form" novalidate>

      <div class="two-col">
        <div class="auth-field">
          <label for="reg-name">Full name</label>
          <div class="auth-input-wrap">
            <input type="text" id="reg-name" placeholder="Alex Singh" autocomplete="name" required>
            <svg class="field-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.6"/>
              <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
          </div>
        </div>

        <div class="auth-field">
          <label for="reg-email">Email address</label>
          <div class="auth-input-wrap">
            <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email" required>
            <svg class="field-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
              <rect x="2" y="4" width="20" height="16" rx="2" stroke="currentColor" stroke-width="1.6"/>
              <path d="M2 8l10 6 10-6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
          </div>
        </div>
      </div>

      <div class="auth-field">
        <label for="reg-password">Password</label>
        <div class="auth-input-wrap" style="position:relative;">
          <input type="password" id="reg-password" placeholder="At least 8 characters" autocomplete="new-password" required>
          <svg class="field-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
            <rect x="5" y="11" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.6"/>
            <path d="M8 11V7a4 4 0 0 1 8 0v4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
          <button type="button" class="pwd-toggle" id="pwd-toggle-reg" aria-label="Toggle password visibility">
            <svg id="eye-icon-reg" width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z" stroke="currentColor" stroke-width="1.6"/>
              <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.6"/>
            </svg>
          </button>
        </div>
        <div class="pwd-strength">
          <div class="pwd-strength-bar"><div class="pwd-strength-fill" id="pwd-fill"></div></div>
          <div class="pwd-strength-label" id="pwd-label">Enter a password</div>
        </div>
      </div>

      <div class="auth-field">
        <label for="reg-confirm">Confirm password</label>
        <div class="auth-input-wrap">
          <input type="password" id="reg-confirm" placeholder="Re-enter password" autocomplete="new-password" required>
          <svg class="field-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M9 12l2 2 4-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            <rect x="5" y="11" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.6"/>
            <path d="M8 11V7a4 4 0 0 1 8 0v4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </div>
      </div>

      <div class="auth-field" style="margin-bottom: 6px;">
        <div class="section-label">Your role</div>
        <div class="role-grid">
          <div>
            <input class="role-option" type="radio" name="role" id="role-citizen" value="citizen" checked>
            <label class="role-label" for="role-citizen">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M4 17V6a2 2 0 0 1 2-2h5l2 2h5a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2Z" stroke="currentColor" stroke-width="1.5"/>
                <circle cx="12" cy="13" r="2.5" stroke="currentColor" stroke-width="1.5"/>
              </svg>
              Citizen Reporter
            </label>
          </div>
          <div>
            <input class="role-option" type="radio" name="role" id="role-municipal" value="municipal">
            <label class="role-label" for="role-municipal">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M12 3l8 4v5c0 5-3.5 8-8 9-4.5-1-8-4-8-9V7z" stroke="currentColor" stroke-width="1.5"/>
              </svg>
              Municipal Staff
            </label>
          </div>
          <div>
            <input class="role-option" type="radio" name="role" id="role-researcher" value="researcher">
            <label class="role-label" for="role-researcher">
              <svg viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="8.5" stroke="currentColor" stroke-width="1.5"/>
                <path d="M12 3.5v3M12 17.5v3M3.5 12h3M17.5 12h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
              Researcher
            </label>
          </div>
        </div>
      </div>

      <div class="auth-field" style="margin-top:16px;">
        <label class="terms-label">
          <input type="checkbox" id="reg-terms" required>
          I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
          I understand all readings are simulated for demonstration.
        </label>
      </div>

      <button type="submit" class="auth-submit" id="reg-btn">
        <span class="btn-label">Create account →</span>
        <div class="btn-spinner"></div>
      </button>
    </form>

    <div class="auth-footer-link">
      Already have an account? <a href="login.html">Sign in →</a>
    </div>
  </div>

<script src="js/auth.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {

    if (AuthManager.isLoggedIn()) {
      window.location.href = 'dashboard.html';
      return;
    }

    const form     = document.getElementById('reg-form');
    const btn      = document.getElementById('reg-btn');
    const errBnr   = document.getElementById('reg-error');
    const errMsg   = document.getElementById('reg-error-msg');
    const sucBnr   = document.getElementById('reg-success');
    const pwdInput = document.getElementById('reg-password');
    const pwdFill  = document.getElementById('pwd-fill');
    const pwdLabel = document.getElementById('pwd-label');

    /* password strength */
    pwdInput.addEventListener('input', () => {
      const v = pwdInput.value;
      let score = 0;
      if (v.length >= 8)  score++;
      if (v.length >= 12) score++;
      if (/[A-Z]/.test(v)) score++;
      if (/[0-9]/.test(v)) score++;
      if (/[^A-Za-z0-9]/.test(v)) score++;

      const pct   = Math.round((score / 5) * 100);
      const colors = ['#e85c4a','#f2a93b','#f2a93b','#35c7b9','#35c7b9'];
      const labels = ['Too weak','Weak','Moderate','Strong','Very strong'];
      pwdFill.style.width      = pct + '%';
      pwdFill.style.background = colors[score - 1] || '#e85c4a';
      pwdLabel.textContent     = v.length ? (labels[score - 1] || 'Very strong') : 'Enter a password';
      pwdLabel.style.color     = colors[score - 1] || 'var(--text-faint)';
    });

    /* eye toggle */
    document.getElementById('pwd-toggle-reg').addEventListener('click', () => {
      const hide = pwdInput.type === 'password';
      pwdInput.type = hide ? 'text' : 'password';
      document.getElementById('eye-icon-reg').innerHTML = hide
        ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><line x1="1" y1="1" x2="23" y2="23" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>`
        : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z" stroke="currentColor" stroke-width="1.6"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.6"/>`;
    });

    function showError(msg) {
      errMsg.textContent = msg;
      errBnr.classList.add('show');
      errBnr.style.animation = 'none';
      errBnr.offsetHeight;
      errBnr.style.animation = '';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errBnr.classList.remove('show');

      const name     = document.getElementById('reg-name').value;
      const email    = document.getElementById('reg-email').value;
      const password = pwdInput.value;
      const confirm  = document.getElementById('reg-confirm').value;
      const role     = document.querySelector('input[name="role"]:checked')?.value || 'citizen';
      const terms    = document.getElementById('reg-terms').checked;

      if (!terms) return showError('Please accept the Terms of Service to continue.');
      if (password !== confirm) return showError('Passwords do not match.');

      btn.classList.add('loading');
      btn.disabled = true;

      await new Promise(r => setTimeout(r, 520));
      const result = await AuthManager.register({ name, email, password, role });

      btn.classList.remove('loading');
      btn.disabled = false;

      if (result.ok) {
        form.style.display = 'none';
        sucBnr.classList.add('show');
        setTimeout(() => {
          window.location.href = `login.html?registered=1`;
        }, 1400);
      } else {
        showError(result.error);
      }
    });
  });
</script>
</body>
</html>
