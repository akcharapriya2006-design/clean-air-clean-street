<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — AeroWatch</title>
<meta name="description" content="Sign in to AeroWatch to access the live air quality map, report hotspots, and manage the ops console.">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/pages.css">
<style>
  /* ── Auth page layout ──────────────────────────────────────────────────── */
  body.auth-page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background-image:
      radial-gradient(ellipse 800px 600px at 20% 10%, rgba(53,199,185,0.12), transparent 60%),
      radial-gradient(ellipse 600px 500px at 85% 90%, rgba(139,126,242,0.14), transparent 55%),
      radial-gradient(rgba(230, 238, 248, 0.02) 1px, transparent 0);
    background-size: 100% 100%, 100% 100%, 24px 24px;
  }

  /* ── Brand header above card ───────────────────────────────────────────── */
  .auth-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--f-display);
    font-weight: 700;
    font-size: 22px;
    color: var(--text);
    text-decoration: none;
    margin-bottom: 32px;
  }
  .auth-brand svg { width: 32px; height: 32px; }

  /* ── Card ──────────────────────────────────────────────────────────────── */
  .auth-card {
    width: 100%;
    max-width: 440px;
    background: rgba(16, 28, 52, 0.75);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(230, 238, 248, 0.1);
    border-radius: var(--radius-lg);
    padding: 40px;
    box-shadow:
      0 24px 64px rgba(0,0,0,0.45),
      0 0 0 1px rgba(53,199,185,0.05) inset;
    animation: cardIn 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(24px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .auth-card h1 {
    font-size: 26px;
    margin-bottom: 6px;
    background: linear-gradient(135deg, #e9edf5 30%, var(--teal));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .auth-card .auth-sub {
    color: var(--text-faint);
    font-size: 14px;
    margin-bottom: 30px;
  }

  /* ── Form fields ───────────────────────────────────────────────────────── */
  .auth-field {
    margin-bottom: 18px;
  }
  .auth-field label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-dim);
    margin-bottom: 7px;
    letter-spacing: 0.03em;
  }
  .auth-input-wrap {
    position: relative;
  }
  .auth-input-wrap svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 18px;
    height: 18px;
    color: var(--text-faint);
    pointer-events: none;
    transition: color 0.2s;
  }
  .auth-field input {
    width: 100%;
    padding: 13px 14px 13px 42px;
    background: rgba(5, 11, 20, 0.6);
    border: 1px solid rgba(230, 238, 248, 0.1);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: var(--f-body);
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .auth-field input::placeholder { color: var(--text-faint); }
  .auth-field input:focus {
    border-color: var(--teal);
    box-shadow: 0 0 0 3px rgba(53,199,185,0.15);
  }
  .auth-field input:focus + svg,
  .auth-field input:focus ~ svg { color: var(--teal); }
  .auth-input-wrap svg { pointer-events: none; }
  /* icon is before input in DOM, use sibling trick */
  .auth-input-wrap { display: flex; align-items: center; }
  .auth-input-wrap .field-icon {
    position: absolute;
    left: 14px;
    color: var(--text-faint);
    pointer-events: none;
    transition: color 0.2s;
    z-index: 1;
  }
  .auth-input-wrap input:focus ~ .field-icon { color: var(--teal); }

  .pwd-toggle {
    position: absolute;
    right: 12px;
    background: none;
    border: none;
    color: var(--text-faint);
    cursor: pointer;
    padding: 4px;
    display: flex;
    align-items: center;
    transition: color 0.15s;
    z-index: 2;
  }
  .pwd-toggle:hover { color: var(--text); }

  /* ── Remember + Forgot row ─────────────────────────────────────────────── */
  .auth-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 22px;
    gap: 12px;
  }
  .auth-check-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13.5px;
    color: var(--text-dim);
    cursor: pointer;
    user-select: none;
  }
  .auth-check-label input[type="checkbox"] {
    width: 16px;
    height: 16px;
    accent-color: var(--teal);
    cursor: pointer;
  }
  .auth-forgot {
    font-size: 13px;
    color: var(--teal);
    text-decoration: none;
    opacity: 0.85;
    transition: opacity 0.15s;
  }
  .auth-forgot:hover { opacity: 1; }

  /* ── Submit button ─────────────────────────────────────────────────────── */
  .auth-submit {
    width: 100%;
    padding: 14px;
    font-family: var(--f-body);
    font-size: 15px;
    font-weight: 700;
    border: none;
    border-radius: var(--radius-sm);
    background: linear-gradient(135deg, var(--teal), #2aa89c);
    color: #04221e;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: box-shadow 0.2s, transform 0.15s, opacity 0.2s;
    position: relative;
    overflow: hidden;
  }
  .auth-submit::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.12);
    opacity: 0;
    transition: opacity 0.15s;
  }
  .auth-submit:hover { box-shadow: 0 8px 28px rgba(53,199,185,0.4); transform: translateY(-1px); }
  .auth-submit:hover::before { opacity: 1; }
  .auth-submit:active { transform: translateY(0); }
  .auth-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  /* spinner inside button */
  .btn-spinner {
    display: none;
    width: 18px; height: 18px;
    border: 2px solid rgba(4,34,30,0.3);
    border-top-color: #04221e;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin: 0 auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .auth-submit.loading .btn-label { display: none; }
  .auth-submit.loading .btn-spinner { display: block; }

  /* ── Error banner ──────────────────────────────────────────────────────── */
  .auth-error {
    display: none;
    background: rgba(232,92,74,0.12);
    border: 1px solid rgba(232,92,74,0.3);
    border-radius: var(--radius-sm);
    color: #f09080;
    font-size: 13.5px;
    padding: 10px 14px;
    margin-bottom: 18px;
    animation: shake 0.4s ease;
  }
  .auth-error.show { display: flex; align-items: center; gap: 8px; }
  @keyframes shake {
    0%,100%{ transform: translateX(0); }
    20%{ transform: translateX(-6px); }
    40%{ transform: translateX(6px); }
    60%{ transform: translateX(-4px); }
    80%{ transform: translateX(4px); }
  }

  /* ── Divider ───────────────────────────────────────────────────────────── */
  .auth-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 24px 0;
    color: var(--text-faint);
    font-size: 12.5px;
  }
  .auth-divider::before, .auth-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  /* ── Footer link ───────────────────────────────────────────────────────── */
  .auth-footer-link {
    text-align: center;
    margin-top: 22px;
    font-size: 13.5px;
    color: var(--text-faint);
  }
  .auth-footer-link a {
    color: var(--teal);
    text-decoration: none;
    font-weight: 600;
  }
  .auth-footer-link a:hover { text-decoration: underline; }

  /* ── Info chips below card ─────────────────────────────────────────────── */
  .auth-info {
    margin-top: 24px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .auth-info-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-faint);
    font-family: var(--f-mono);
  }
  .auth-info-chip span { color: var(--teal); }
</style>
</head>
<body class="auth-page">

  <a href="index.html" class="auth-brand">
    <svg viewBox="0 0 26 26" fill="none">
      <path d="M13 2 L23 8 V18 L13 24 L3 18 V8 Z" stroke="#35c7b9" stroke-width="1.6"/>
      <circle cx="13" cy="13" r="4.2" fill="#35c7b9"/>
    </svg>
    AeroWatch
  </a>

  <div class="auth-card">
    <h1>Welcome back</h1>
    <p class="auth-sub">Sign in to access the live map and ops console.</p>

    <div class="auth-error" id="login-error" role="alert">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.6"/>
        <path d="M12 8v4M12 16h.01" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <span id="login-error-msg">Invalid credentials.</span>
    </div>

    <form id="login-form" novalidate>
      <div class="auth-field">
        <label for="login-email">Email address</label>
        <div class="auth-input-wrap">
          <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" required>
          <svg class="field-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
            <rect x="2" y="4" width="20" height="16" rx="2" stroke="currentColor" stroke-width="1.6"/>
            <path d="M2 8l10 6 10-6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </div>
      </div>

      <div class="auth-field">
        <label for="login-password">Password</label>
        <div class="auth-input-wrap" style="position:relative;">
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" required>
          <svg class="field-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
            <rect x="5" y="11" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.6"/>
            <path d="M8 11V7a4 4 0 0 1 8 0v4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
          <button type="button" class="pwd-toggle" id="pwd-toggle" aria-label="Toggle password visibility">
            <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z" stroke="currentColor" stroke-width="1.6"/>
              <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.6"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="auth-row">
        <label class="auth-check-label">
          <input type="checkbox" id="remember-me">
          Remember me
        </label>
        <a href="#" class="auth-forgot">Forgot password?</a>
      </div>

      <button type="submit" class="auth-submit" id="login-btn">
        <span class="btn-label">Sign in</span>
        <div class="btn-spinner"></div>
      </button>
    </form>

    <div class="auth-divider">or</div>

    <div class="auth-footer-link">
      Don't have an account?
      <a href="register.html">Create one free →</a>
    </div>
  </div>

  <div class="auth-info">
    <div class="auth-info-chip"><span>●</span> Client-side secure</div>
    <div class="auth-info-chip"><span>●</span> No data leaves your device</div>
    <div class="auth-info-chip"><span>●</span> SHA-256 hashed</div>
  </div>

<script src="js/auth.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    // If already logged in, redirect to destination
    if (AuthManager.isLoggedIn()) {
      const params = new URLSearchParams(location.search);
      window.location.href = params.get('next') || 'dashboard.html';
      return;
    }

    const form      = document.getElementById('login-form');
    const btn       = document.getElementById('login-btn');
    const errBanner = document.getElementById('login-error');
    const errMsg    = document.getElementById('login-error-msg');
    const pwdInput  = document.getElementById('login-password');
    const pwdToggle = document.getElementById('pwd-toggle');
    const eyeIcon   = document.getElementById('eye-icon');

    /* password show/hide */
    pwdToggle.addEventListener('click', () => {
      const isHidden = pwdInput.type === 'password';
      pwdInput.type  = isHidden ? 'text' : 'password';
      eyeIcon.innerHTML = isHidden
        ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><line x1="1" y1="1" x2="23" y2="23" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>`
        : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z" stroke="currentColor" stroke-width="1.6"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.6"/>`;
    });

    function showError(msg) {
      errMsg.textContent = msg;
      errBanner.classList.add('show');
      /* re-trigger shake */
      errBanner.style.animation = 'none';
      errBanner.offsetHeight;
      errBanner.style.animation = '';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errBanner.classList.remove('show');
      btn.classList.add('loading');
      btn.disabled = true;

      const email    = document.getElementById('login-email').value;
      const password = pwdInput.value;
      const remember = document.getElementById('remember-me').checked;

      // Small delay to show the spinner (feels more real)
      await new Promise(r => setTimeout(r, 420));

      const result = await AuthManager.login({ email, password, remember });

      btn.classList.remove('loading');
      btn.disabled = false;

      if (result.ok) {
        btn.classList.add('loading');
        btn.querySelector('.btn-label').style.display = 'none';
        btn.querySelector('.btn-spinner').style.display = 'block';
        // redirect to the 'next' param or default dashboard
        const params = new URLSearchParams(location.search);
        setTimeout(() => {
          window.location.href = params.get('next') || 'dashboard.html';
        }, 200);
      } else {
        showError(result.error);
      }
    });
  });
</script>
</body>
</html>
